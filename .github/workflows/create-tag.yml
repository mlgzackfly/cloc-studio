name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without leading v (example: 0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PAT secret
        run: |
          if [[ -z "${{ secrets.RELEASE_PAT }}" ]]; then
            echo "Missing repository secret RELEASE_PAT"
            exit 1
          fi

      - name: Validate version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi

      - name: Create tag via GitHub API
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          TAG="v${{ github.event.inputs.version }}"
          if gh api "repos/$REPO/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists on remote: $TAG"
            exit 1
          fi
          SHA="$(gh api "repos/$REPO/commits/$DEFAULT_BRANCH" --jq .sha)"
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            echo "Failed to resolve default branch commit SHA"
            exit 1
          fi
          gh api "repos/$REPO/git/refs" \
            -f ref="refs/tags/$TAG" \
            -f sha="$SHA"
          echo "Created tag $TAG at $SHA"
