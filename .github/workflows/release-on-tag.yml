name: Release on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Build app package
        run: ./scripts/package_app.sh

      - name: Create checksum
        run: shasum -a 256 dist/cloc-studio.zip > dist/cloc-studio.zip.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            dist/cloc-studio.zip \
            dist/cloc-studio.zip.sha256 \
            --generate-notes \
            --verify-tag
